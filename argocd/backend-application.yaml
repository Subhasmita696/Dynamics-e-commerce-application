apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-helm
  namespace: argocd
spec:
  project: default
  source:
    path: helm/backend
    repoURL: 'https://github.com/your-username/your-repo.git' # Update with your repo
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

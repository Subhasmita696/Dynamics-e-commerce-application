apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-helm
  namespace: argocd
spec:
  project: default
  source:
    path: helm/frontend
    repoURL: 'https://github.com/your-username/your-repo.git' # Update with your repo
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
